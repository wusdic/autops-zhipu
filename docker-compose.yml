version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: autops-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-autops_root_2026}
      MYSQL_DATABASE: autops
      MYSQL_USER: autops
      MYSQL_PASSWORD: ${DB_PASSWORD:-autops_2026}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: autops-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ../backend
      dockerfile: ../deploy/docker/Dockerfile.backend
    container_name: autops-backend
    restart: always
    ports:
      - "${BACKEND_PORT:-8001}:8001"
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: autops
      DB_PASSWORD: ${DB_PASSWORD:-autops_2026}
      DB_DATABASE: autops
      REDIS_URL: redis://redis:6379/0
      LLM_BASE_URL: ${LLM_BASE_URL:-http://host.docker.internal:8000/v1}
      LLM_MODEL: ${LLM_MODEL:-qwen3.5-0.8b}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../configs:/app/configs:ro

volumes:
  mysql_data:
  redis_data:
