version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: autops-mysql
    restart: always
    env_file:
      - .env
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD must be set}
      MYSQL_DATABASE: autops
      MYSQL_USER: autops
      MYSQL_PASSWORD: ${DB_PASS:?DB_PASS must be set}
    ports:
      - "127.0.0.1:3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./deploy/docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: autops-redis
    restart: always
    env_file:
      - .env
    ports:
      # 仅绑定到本机回环，避免 Redis 无认证对外暴露（生产应配合 requirepass）
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  migrate:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: autops-migrate
    env_file:
      - .env
    environment:
      AUTOPS_ENV: prod
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: autops
      DB_PASS: ${DB_PASS:?DB_PASS must be set}
      DB_DATABASE: autops
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set}
    entrypoint: ["alembic", "upgrade", "head"]
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./configs:/app/configs:ro

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: autops-backend
    restart: always
    env_file:
      - .env
    ports:
      # 仅绑定本机回环，对外由 frontend nginx 反代 /api/ 到后端
      - "127.0.0.1:${BACKEND_PORT:-8001}:8001"
    environment:
      AUTOPS_ENV: prod
      AUTOPS_PROCESS_ROLE: api
      AUTOPS_ALLOW_INPROCESS_EVENTS: "false"
      AUTOPS_ENABLE_SCHEDULER: "false"
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: autops
      DB_PASS: ${DB_PASS:?DB_PASS must be set}
      DB_DATABASE: autops
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set}
      LLM_BASE_URL: ${LLM_BASE_URL:-http://host.docker.internal:8000/v1}
      LLM_MODEL_NAME: ${LLM_MODEL_NAME:-qwen3.5-0.8b}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    volumes:
      - ./configs:/app/configs:ro
    healthcheck:
      # python:slim 镜像不带 curl，改用标准库探活，避免健康检查恒失败
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0) if urllib.request.urlopen('http://localhost:8001/health', timeout=3).status==200 else sys.exit(1)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: autops-worker
    restart: always
    env_file:
      - .env
    entrypoint: ["python", "-m", "app.workers.runner"]
    environment:
      AUTOPS_ENV: prod
      AUTOPS_PROCESS_ROLE: worker
      AUTOPS_ALLOW_INPROCESS_EVENTS: "true"
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: autops
      DB_PASS: ${DB_PASS:?DB_PASS must be set}
      DB_DATABASE: autops
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set}
      LLM_BASE_URL: ${LLM_BASE_URL:-http://host.docker.internal:8000/v1}
      LLM_MODEL_NAME: ${LLM_MODEL_NAME:-qwen3.5-0.8b}
      AUTOPS_ENABLE_SCHEDULER: "true"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    volumes:
      - ./configs:/app/configs:ro

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: autops-frontend
    restart: always
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      - backend

volumes:
  mysql_data:
  redis_data:
